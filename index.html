<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>ブロック崩しオンライン</title><style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;touch-action:none;}
.hd{width:360px;display:flex;justify-content:space-between;align-items:center;font-weight:bold;font-size:14px;margin-bottom:5px;}
canvas{background:#222;border:2px solid #fff;display:block;}
.m{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
.mc{background:#333;padding:20px;border-radius:8px;text-align:center;border:1px solid #fff;}
button{background:#0095DD;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-weight:bold;margin:4px;}
</style></head><body>
<div class="hd"><div>点:<span id="s">0</span> P:<span id="p">0</span></div><div id="vs" style="color:#55efc4">検索中...</div><button onclick="pzs(1)">📦<span id="b">0</span></button></div>
<canvas id="c" width="360" height="320"></canvas>
<div style="margin-top:10px;"><button onclick="gch()">ガチャ(50P)</button><button onclick="sv(1)">セーブ</button><button onclick="sv(0)">読込</button></div>
<div class="m" id="md"><div class="mc"><h3>📦 アイテム使用</h3><button onclick="itM(0)">パドル巨大化 (<span id="i0">0</span>)</button><br><button onclick="itM(1)">ボール減速 (<span id="i1">0</span>)</button><br><button style="background:#e74c3c" onclick="pzs(0)">閉じる</button></div></div>
<script>
const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let sc=0,pt=0,itm=[0,0],pzd=0,x=180,y=250,dx=2,dy=-2,pw=60,px=150,tx=180,rvX=150,rvSc=0,rvN="Rival_"+Math.floor(1000+Math.random()*9000);
const br=[],rC=3,cC=5,bW=56,bH=15,pPad=6,pT=40,pL=25;
setTimeout(()=>document.getElementById("vs").textContent="⚔️ VS "+rvN,2000);
function initB(){for(let c=0;c<cC;c++){br[c]=[];for(let r=0;r<rC;r++)br[c][r]={x:0,y:0,s:1,t:Math.random()<0.2?1:0};}} initB();
function pzs(f){pzd=f;document.getElementById("md").style.display=f?"flex":"none";if(!f)draw();}
function uh(){document.getElementById("s").textContent=sc;document.getElementById("p").textContent=pt;document.getElementById("b").textContent=itm[0]+itm[1];document.getElementById("i0").textContent=itm[0];document.getElementById("i1").textContent=itm[1];}
function gch(){if(pt<50)return alert("P不足");pt-=50;let r=Math.random();if(r<0.4){itm[0]++;alert("巨大化獲得");}else if(r<0.8){itm[1]++;alert("減速獲得");}else{sc+=300;alert("スコア+300");}uh();}
function itM(t){if(itm[t]<=0)return;itm[t]--;if(t===0){pw=100;setTimeout(()=>pw=60,15000);}else{dx*=0.5;dy*=0.5;setTimeout(()=>{dx*=(dx>0?2:2);dy*=(dy>0?2:2);},10000);}pzs(0);uh();}
function sv(f){if(f){let cd=btoa(JSON.stringify({s:sc,p:pt,i:itm}));navigator.clipboard.writeText(cd);alert("コピー完了");}else{try{let d=JSON.parse(atob(prompt("コード入力")));sc=d.s;pt=d.p;itm=d.i;uh();}catch(e){alert("失敗");}}}
function ptr(e){if(pzd)return;const r=cv.getBoundingClientRect();tx=((e.touches?e.touches[0].clientX:e.clientX)-r.left)*(cv.width/r.width);}
cv.addEventListener("mousemove",ptr);cv.addEventListener("touchstart",ptr,{passive:true});cv.addEventListener("touchmove",ptr,{passive:true});
function draw(){
    if(pzd)return;ctx.clearRect(0,0,cv.width,cv.height);
    ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.beginPath();ctx.moveTo(0,40);ctx.lineTo(cv.width,40);ctx.stroke();
    let rTx=x-30;rvX+=(rTx-rvX)*0.07;if(rvX<0)rvX=0;if(rvX>cv.width-60)rvX=cv.width-60;if(Math.random()<0.003)rvSc+=10;
    ctx.fillStyle="#ff7675";ctx.fillRect(rvX,12,60,6);ctx.fillStyle="#0095DD";ctx.fillRect(px,cv.height-8,pw,8);
    ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
    for(let c=0;c<cC;c++)for(let r=0;r<rC;r++){let b=br[c][r];if(b.s){b.x=c*(bW+pPad)+pL;b.y=r*(bH+pPad)+pT;ctx.fillStyle=b.t?"#9B59B6":"#FF5733";ctx.fillRect(b.x,b.y,bW,bH);
    if(x>b.x&&x<b.x+bW&&y>b.y&&y<b.y+bH){dy=-dy;b.s=0;if(!b.t){sc+=10;pt+=5;}uh();if(br.every(ro=>ro.every(bl=>!bl.s))){pt+=50;initB();x=180;y=250;dy=-2;}}}}
    if(x+dx>cv.width-6||x+dx<6)dx=-dx;if(y+dy<20){if(x>rvX&&x<rvX+60){dy=-dy;rvSc+=15;}else if(y+dy<6)dy=-dy;}
    if(y+dy>cv.height-6){if(x>px&&x<px+pw)dy=-dy;else{alert("GAME OVER");sc=0;x=180;y=250;dy=-2;initB();uh();tx=180;}}
    px+=(tx-(px+pw/2))*0.35;if(px<0)px=0;if(px>cv.width-pw)px=cv.width-pw;x+=dx;y+=dy;requestAnimationFrame(draw);
}uh();draw();
</script></body></html>
